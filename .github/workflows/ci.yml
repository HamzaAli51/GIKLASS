name: GIKLASS CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install jest only
        run: npm install --save-dev jest @jest/globals

      - name: Run tests
        run: node --no-warnings --experimental-vm-modules node_modules/.bin/jest