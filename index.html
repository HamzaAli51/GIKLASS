<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GIKLASS</title>
    <style>
        /* Paste your CSS here or use basic styling for now */
        body { font-family: sans-serif; background: #f8fafc; color: #1e293b; margin: 0; padding: 20px; }
        .auth-card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); max-width: 400px; margin: auto; }
        .btn { padding: 10px 20px; border-radius: 6px; border: none; cursor: pointer; width: 100%; background: #2563eb; color: white; font-weight: 600; }
    </style>
</head>
<body>
    <div id="app"></div>

    <div id="modal-container" style="display:none;">
        <div id="modal-body"></div>
        <button id="close-modal">Close</button>
    </div>

    <script type="module">
        // PASTE YOUR main.js CONTENT HERE
        const API_BASE = '/api';
        let user = null;
        let currentView = 'landing';

        const app = document.getElementById('app');

        function setView(view) {
            currentView = view;
            render();
        }

        function render() {
            if (currentView === 'landing') {
                app.innerHTML = `
                    <div class="auth-card">
                        <h1>GIKLASS</h1>
                        <p>Simplified learning.</p>
                        <button class="btn" onclick="window.setView('login')">Open GIKLASS</button>
                    </div>`;
            } else if (currentView === 'login') {
                app.innerHTML = `<div class="auth-card"><h2>Login</h2><p>Login logic goes here...</p></div>`;
            }
        }

        // Essential for onclick handlers in HTML strings
        window.setView = setView;

        // Start the app
        render();
    </script>
</body>
</html>
